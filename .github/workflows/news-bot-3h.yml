name: news-bot (every 3h) v2

on:
  schedule:
    - cron: "0 */3 * * *"      # 3時間おき（UTC）
  workflow_dispatch:

permissions:
  contents: write              # state/posted_urls.txt をGitHubへ保存するために必要

concurrency:
  group: news-bot
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: List repo (debug)
        run: |
          pwd
          ls -la
          echo "GITHUB_SHA=$GITHUB_SHA"

      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install -U pip
          pip install -r requirements.txt

      - name: Check secret exists (repo secret)
        run: |
          if [ -z "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            echo "ERROR: SLACK_WEBHOOK_URL secret is missing."
            exit 1
          fi
          echo "Secret PRESENT (masked)."

      - name: Check env passed (debug)
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "ERROR: env var SLACK_WEBHOOK_URL is empty"
            exit 1
          fi
          echo "ENV PRESENT (masked)."

      - name: Run collector and post to Slack
        run: python src/main.py

      - name: Save posted URLs state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add state/posted_urls.txt

          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update posted URLs state"
            git push
          fi