# =========================================
# AI判定設定
# =========================================
# キーワード判定で拾った候補を、OpenAI APIで二次判定する。
# OPENAI_API_KEY が設定されていない場合は自動的にスキップされる。

ai_judgement:
  enabled: true
  model: gpt-4.1-mini
  max_items_per_run: 30
  min_score_to_post: 60
  timeout_seconds: 20

  criteria:
    target: "宿泊施設・宿泊業界に関する営業機会、業界動向、開業、改装、運営変更、M&A、DX導入のニュース"
    reject: "単なる宿泊プラン、飲食イベント、割引キャンペーン、採用、観光一般、ペットホテルなど宿泊施設営業と関係が薄いニュース"
