# =========================================
# Googleスプレッドシート連携設定
# =========================================
# Slack/Gmail下書き対象として残ったニュースを1行ずつ追記する。

news_sheet:
  enabled: false
  spreadsheet_id: ""
  worksheet_name: "ニュース一覧"
  max_rows_per_run: 30
  columns:
    - 取得日
    - 分類
    - ニュースタイトル
    - URL
    - 施設名
    - 県名
    - 運営会社
    - 媒体
    - 重複キー
